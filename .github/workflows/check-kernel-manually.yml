name: Build MonadBox (mihomo/alpha, arm64)

on:
  workflow_dispatch:
    inputs:
      force:
        description: 'Force rebuild even when mihomo/alpha is unchanged'
        required: false
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: build-monadbox-manual
  cancel-in-progress: false

jobs:
  resolve:
    name: Resolve mihomo/alpha
    runs-on: ubuntu-latest
    outputs:
      new_sha: ${{ steps.resolve.outputs.new_sha }}
      new_sha_short: ${{ steps.resolve.outputs.new_sha_short }}
      should_build: ${{ steps.compare.outputs.should_build }}
      skip_reason: ${{ steps.compare.outputs.skip_reason }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Read currently tracked SHA
        id: read_state
        run: |
          set -euo pipefail
          state_file=".github/kernel-state/alpha.txt"
          if [ -f "$state_file" ]; then
            current_sha=$(cut -d'|' -f3 "$state_file")
          else
            current_sha=""
          fi
          echo "current_sha=${current_sha}" >> "$GITHUB_OUTPUT"
          echo "::notice::Tracked mihomo/alpha @ ${current_sha:-<none>}"

      - name: Resolve latest mihomo/alpha revision
        id: resolve
        run: |
          set -euo pipefail
          # Try peeled ref first (annotated tag), fall back to direct ref
          # (lightweight tags don't support ^{} dereference).
          new_sha=$(
            git ls-remote https://github.com/MetaCubeX/mihomo.git \
              'refs/tags/Prerelease-Alpha^{}' \
            | awk 'NR==1 {print $1}'
          )
          if [ -z "$new_sha" ]; then
            new_sha=$(
              git ls-remote https://github.com/MetaCubeX/mihomo.git \
                'refs/tags/Prerelease-Alpha' \
              | awk 'NR==1 {print $1}'
            )
          fi
          if [ -z "$new_sha" ]; then
            echo "::error::Failed to resolve mihomo/alpha revision"
            exit 1
          fi
          new_sha_short=${new_sha:0:8}
          echo "new_sha=${new_sha}" >> "$GITHUB_OUTPUT"
          echo "new_sha_short=${new_sha_short}" >> "$GITHUB_OUTPUT"
          echo "::notice::Latest mihomo/alpha @ ${new_sha}"

      - name: Decide whether to build
        id: compare
        env:
          FORCE: ${{ inputs.force }}
          CURRENT: ${{ steps.read_state.outputs.current_sha }}
          NEW: ${{ steps.resolve.outputs.new_sha }}
        run: |
          set -euo pipefail
          if [ "$FORCE" = "true" ]; then
            should_build=true
            skip_reason=force_rebuild
            echo "::notice::Force rebuild requested (input.force=true)"
          elif [ -z "$CURRENT" ]; then
            should_build=true
            skip_reason=initial_build
            echo "::notice::No previous state tracked — first build"
          elif [ "$CURRENT" = "$NEW" ]; then
            should_build=false
            skip_reason=up_to_date
            echo "::notice::mihomo/alpha unchanged at ${NEW:0:8} — skipping build"
          else
            should_build=true
            skip_reason=new_commit
            echo "::notice::New mihomo/alpha: ${CURRENT:0:8} -> ${NEW:0:8}"
          fi
          {
            echo "should_build=${should_build}"
            echo "skip_reason=${skip_reason}"
          } >> "$GITHUB_OUTPUT"

  build:
    name: Build arm64 APK
    needs: resolve
    if: needs.resolve.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Kotlin
        # Pinned direct download — avoids fwilhe2/setup-kotlin@main (floating ref).
        run: |
          set -euo pipefail
          kotlin_version=2.2.10
          curl -fsSL \
            -o /tmp/kotlin-compiler.zip \
            "https://github.com/JetBrains/kotlin/releases/download/v${kotlin_version}/kotlin-compiler-${kotlin_version}.zip"
          unzip -q /tmp/kotlin-compiler.zip -d /opt/
          echo "/opt/kotlinc/bin" >> "$GITHUB_PATH"
          kotlin -version 2>&1

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: true
          cache-dependency-path: |
            **/go.sum

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4.0.1

      - name: Install NDK & build-tools
        run: |
          set -euo pipefail
          yes | sdkmanager --licenses >/dev/null 2>&1 || true
          sdkmanager \
            "ndk;27.3.13750724" \
            "platform-tools" \
            "build-tools;35.0.0"

      - name: Configure local.properties
        run: |
          echo "sdk.dir=${ANDROID_SDK_ROOT}" > local.properties

      - name: Update CA certificates
        run: |
          set -euo pipefail
          run_as_root() {
            if [ "$(id -u)" -eq 0 ]; then
              "$@"
            elif sudo -n true 2>/dev/null; then
              sudo "$@"
            else
              return 1
            fi
          }
          if run_as_root true; then
            run_as_root apt-get update
            run_as_root apt-get install -y ca-certificates
            run_as_root update-ca-certificates
          elif [ -f /etc/ssl/certs/ca-certificates.crt ]; then
            echo "Using existing system CA bundle."
          else
            echo "::error::Cannot refresh CA certificates and no system bundle present"
            exit 1
          fi
          mkdir -p modules/core/src/foss/golang/mihomo/component/ca
          cp -f /etc/ssl/certs/ca-certificates.crt modules/core/src/foss/golang/mihomo/component/ca/ca-certificates.crt

      - name: Sync kernel
        run: |
          set -euo pipefail
          chmod +x scripts/sync-kernel.sh
          ./scripts/sync-kernel.sh alpha

      - name: Build native libraries (arm64)
        env:
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}
          ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}
          ANDROID_NDK_HOME: ${{ env.ANDROID_SDK_ROOT }}/ndk/27.3.13750724
          ABI_APP_LIST: arm64-v8a
        run: kotlin -Dabi.app.list=arm64-v8a scripts/native-build.main.kts --all

      - name: Build APK
        env:
          STARTUP_GATE_RELEASE_FINGERPRINT: ${{ secrets.STARTUP_GATE_RELEASE_FINGERPRINT }}
        run: |
          set -euo pipefail
          chmod +x gradlew
          if [ -n "${STARTUP_GATE_RELEASE_FINGERPRINT:-}" ]; then
            startup_gate_flag="-Pstartup.gate.releaseFingerprint=${STARTUP_GATE_RELEASE_FINGERPRINT}"
          else
            startup_gate_flag="-Pstartup.gate.enabled=false"
          fi
          ./gradlew assembleRelease \
            -Pabi.app.list=arm64-v8a \
            -Prelease.signing.required=false \
            ${startup_gate_flag} \
            --no-daemon

      - name: Restore CI signing keystore
        id: keystore
        env:
          SIGNING_KEYSTORE_BASE64: ${{ secrets.SIGNING_KEYSTORE_BASE64 }}
        run: |
          set -euo pipefail
          KEYSTORE_FILE="ci.keystore"

          if [ -n "${SIGNING_KEYSTORE_BASE64:-}" ]; then
            printf '%s' "${SIGNING_KEYSTORE_BASE64}" | base64 --decode > "$KEYSTORE_FILE"
            echo "::notice::Using CI keystore from secrets"
          else
            # No secrets configured — generate a one-shot keystore for this run.
            # APKs from different runs won't be installable over each other.
            # To enable incremental install, generate a keystore locally and set
            # SIGNING_KEYSTORE_BASE64 + SIGNING_STORE_PASSWORD + SIGNING_KEY_ALIAS
            # + SIGNING_KEY_PASSWORD as GitHub repository secrets.
            keytool -genkey -v \
              -keystore "$KEYSTORE_FILE" \
              -alias monadbox-ci \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -storepass monadbox-ci-store \
              -keypass monadbox-ci-key \
              -dname "CN=MonadBox CI"
            echo "::notice::Generated one-shot keystore (secrets not configured)"
          fi

          echo "keystore_file=${KEYSTORE_FILE}" >> "$GITHUB_OUTPUT"

      - name: Sign APK with CI keystore
        env:
          SIGNING_KEYSTORE_BASE64: ${{ secrets.SIGNING_KEYSTORE_BASE64 }}
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: |
          set -euo pipefail
      
          apk_unsigned=$(find build/app/outputs/apk/release \
            -maxdepth 1 \
            -name "*.apk" \
            ! -name "*-signed.apk" \
            | head -n1)
      
          if [ -z "$apk_unsigned" ]; then
            echo "::error::No unsigned APK found"
            exit 1
          fi
      
          APKSIGNER="$ANDROID_SDK_ROOT/build-tools/35.0.0/apksigner"
      
          if [ ! -x "$APKSIGNER" ]; then
            echo "::error::apksigner not found"
            echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
      
            echo "===== build-tools ====="
            ls -R "$ANDROID_SDK_ROOT/build-tools" || true
      
            exit 1
          fi
      
          echo "Using apksigner:"
          "$APKSIGNER" version || true
      
          if [ -n "${SIGNING_KEYSTORE_BASE64:-}" ]; then
            storepass="${SIGNING_STORE_PASSWORD}"
            alias="${SIGNING_KEY_ALIAS}"
            keypass="${SIGNING_KEY_PASSWORD}"
          else
            storepass="monadbox-ci-store"
            alias="monadbox-ci"
            keypass="monadbox-ci-key"
          fi
      
          apk_signed="${apk_unsigned%.apk}-signed.apk"
      
          "$APKSIGNER" sign \
            --ks "${{ steps.keystore.outputs.keystore_file }}" \
            --ks-pass "pass:${storepass}" \
            --ks-key-alias "$alias" \
            --key-pass "pass:${keypass}" \
            --out "$apk_signed" \
            "$apk_unsigned"
      
          rm -f "$apk_unsigned"
          mv "$apk_signed" "$apk_unsigned"
      
          echo "Signed APK: $apk_unsigned"
      
          "$APKSIGNER" verify --verbose "$apk_unsigned"

      - name: Verify APK output
        run: |
          set -euo pipefail
          apk=$(find build/app/outputs/apk/release -maxdepth 1 -name '*.apk' | head -1)
          if [ -z "$apk" ]; then
            echo "::error::No APK found in build/app/outputs/apk/release/"
            echo "::group::Build output listing"
            find build/app/outputs -type f 2>/dev/null || true
            echo "::endgroup::"
            exit 1
          fi
          echo "Found APK: $apk"
          ls -lh "$apk"
          file "$apk"

      - name: Upload APK artifact (1-day retention)
        uses: actions/upload-artifact@v6
        with:
          name: monadbox-arm64-alpha-${{ needs.resolve.outputs.new_sha_short }}
          path: build/app/outputs/apk/release/*.apk
          retention-days: 1
          if-no-files-found: error

  commit-state:
    name: Update tracked mihomo/alpha SHA
    needs: [resolve, build]
    if: needs.resolve.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Write new state
        run: |
          set -euo pipefail
          mkdir -p .github/kernel-state
          new_sha=${{ needs.resolve.outputs.new_sha }}
          printf '%s|%s|%s\n' \
            "https://github.com/MetaCubeX/mihomo.git" \
            "Prerelease-Alpha" \
            "$new_sha" \
            > .github/kernel-state/alpha.txt
          echo "Wrote state:"
          cat .github/kernel-state/alpha.txt

      - name: Commit and push state
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/kernel-state/alpha.txt
          if git diff --cached --quiet; then
            echo "No state change to commit."
            exit 0
          fi
          git commit -m "chore(kernel-state): sync alpha to Prerelease-Alpha (${{ needs.resolve.outputs.new_sha_short }})"
          # Defensive rebase: a concurrent manual run may have pushed first.
          git pull --rebase origin "$GITHUB_REF_NAME" 2>/dev/null || true
          git push
