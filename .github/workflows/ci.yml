name: CI

on:
  push:
    branches: [ "Monad" ]
    paths-ignore:
      - '**.md'
      - '**.example'
      - 'docs/**'
      - '.clang-format'
      - '.github/**'
      - '.gitignore'

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-native:
    uses: ./.github/workflows/reusable-build-native.yml
    with:
      kernel_channel: meta
      artifact_name: native-runtime-ci

  build:
    name: Build 
    needs: build-native
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3.2.2
        with:
          packages: ''

      - name: Cache NDK
        id: cache-ndk
        uses: actions/cache@v5
        with:
          path: ${{ env.ANDROID_SDK_ROOT }}/ndk/27.3.13750724
          key: ${{ runner.os }}-ndk-27.3.13750724-v1
          restore-keys: |
            ${{ runner.os }}-ndk-27.3.13750724-

      - name: Install NDK
        if: steps.cache-ndk.outputs.cache-hit != 'true'
        run: sdkmanager "ndk;27.3.13750724"

      - name: Configure local.properties
        run: |
          echo "sdk.dir=${ANDROID_SDK_ROOT}" > local.properties
          echo "ndk.dir=${ANDROID_SDK_ROOT}/ndk/27.3.13750724" >> local.properties

      - name: Update CA certificates
        run: |
          run_as_root() {
            if [ "$(id -u)" -eq 0 ]; then
              "$@"
            elif sudo -n true 2>/dev/null; then
              sudo "$@"
            else
              return 1
            fi
          }

          if run_as_root true; then
            run_as_root apt-get update
            run_as_root apt-get install -y ca-certificates
            run_as_root update-ca-certificates
          elif [ ! -f /etc/ssl/certs/ca-certificates.crt ]; then
            echo "ca-certificates bundle missing and sudo is unavailable" >&2
            exit 1
          else
            echo "Skipping CA package refresh because sudo is unavailable; using existing system bundle."
          fi

          mkdir -p modules/core/src/foss/golang/mihomo/component/ca
          cp -f /etc/ssl/certs/ca-certificates.crt modules/core/src/foss/golang/mihomo/component/ca/ca-certificates.crt

      - name: Sync kernel
        run: |
          chmod +x scripts/sync-kernel.sh
          ./scripts/sync-kernel.sh meta

      - name: Download native runtime
        uses: actions/download-artifact@v5
        with:
          name: native-runtime-ci
          path: native-runtime-download

      - name: Extract native runtime
        shell: bash
        run: |
          set -euo pipefail
          tar -xf native-runtime-download/native-runtime-artifact.tar -C .

      - name: Verify native outputs
        shell: bash
        run: |
          set -euo pipefail
          test -f build/native/go/arm64-v8a/libclash.so
          test -f build/native/cpp/obj/arm64-v8a/libbridge.so
          test -f build/jniLibs/arm64-v8a/libclash.so
          test -f build/jniLibs/arm64-v8a/libbridge.so

      - name: Repository health
        run: |
          chmod +x scripts/repo-health.sh
          ./scripts/repo-health.sh

      - name: Modernization and policy gates
        run: |
          chmod +x gradlew
          ./gradlew checkLintBaselineBudget checkModernizationBaseline checkUiContracts checkGithubOssLicensePolicy --no-daemon

      - name: Check and build debug
        run: |
          chmod +x gradlew
          ./gradlew check assembleDebug --no-daemon

      - name: Upload test reports
        if: always() && github.actor != 'nektos/act'
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-reports
          path: |
            **/build/reports/tests/**
            **/build/test-results/**
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload lint report
        if: always() && github.actor != 'nektos/act'
        uses: actions/upload-artifact@v4
        with:
          name: lint-report
          path: |
            build/app/reports/lint-results-*.html
            build/app/reports/lint-results-*.xml
          retention-days: 7
          if-no-files-found: ignore

