name: Check Kernel Automatically 

on:
  schedule:
    - cron: '0 18 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.detect.outputs.matrix }}
      has_changes: ${{ steps.detect.outputs.has_changes }}

    steps:
      - uses: actions/checkout@v4

      - name: Detect changes
        id: detect
        run: |
          set -e
          mkdir -p .github/kernel-state
          chmod +x scripts/sync-kernel.sh

          changed='[]'

          for channel in meta alpha smart; do
            state="$(./scripts/sync-kernel.sh $channel --print-state)"
            repo=$(echo "$state" | cut -d'|' -f1)
            tag=$(echo "$state" | cut -d'|' -f2)
            rev=$(echo "$state" | cut -d'|' -f3)

            old="$(cat .github/kernel-state/$channel.txt 2>/dev/null || true)"

            echo "$channel => $state (old: $old)"

            if [ "$state" != "$old" ]; then
              item=$(jq -cn \
                --arg c "$channel" \
                --arg r "$repo" \
                --arg t "$tag" \
                --arg v "$rev" \
                '{kernel_channel:$c, repo:$r, tag:$t, revision:$v}')
              changed=$(jq -c ". + [$item]" <<<"$changed")
            fi
          done

          if [ "$(jq length <<<"$changed")" -gt 0 ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "matrix={\"include\":$changed}" >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo 'matrix={"include":[]}' >> $GITHUB_OUTPUT
          fi

  release:
    needs: detect
    if: needs.detect.outputs.has_changes == 'true'
    strategy:
      matrix: ${{ fromJson(needs.detect.outputs.matrix) }}

    uses: ./.github/workflows/release-build.yml
    with:
      kernel_channel: ${{ matrix.kernel_channel }}
      upstream_repo: ${{ matrix.repo }}
      upstream_tag: ${{ matrix.tag }}
      upstream_revision: ${{ matrix.revision }}
    secrets: inherit
