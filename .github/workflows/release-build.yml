name: Build Release

on:
  workflow_call:
    inputs:
      kernel_channel:
        required: true
        type: string
      upstream_repo:
        required: true
        type: string
      upstream_tag:
        required: true
        type: string
      upstream_revision:
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ inputs.kernel_channel }}-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  build-native:
    uses: ./.github/workflows/reusable-build-native.yml
    with:
      kernel_channel: ${{ inputs.kernel_channel }}
      artifact_name: native-libs-${{ inputs.kernel_channel }}

  release:
    name: Build And Publish Release
    needs: build-native
    runs-on: ubuntu-latest
    env:
      CHANNEL: ${{ inputs.kernel_channel }}
      REPO: ${{ inputs.upstream_repo }}
      TAG: ${{ inputs.upstream_tag }}
      REV: ${{ inputs.upstream_revision }}
      GH_TOKEN: ${{ github.token }}

    steps:
      - name: Checkout branch with full history
        uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Kotlin
        uses: fwilhe2/setup-kotlin@main

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: true
          cache-dependency-path: |
            **/go.sum

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3.2.2
        with:
          packages: ''

      - name: Cache NDK
        id: cache-ndk
        uses: actions/cache@v5
        with:
          path: ${{ env.ANDROID_SDK_ROOT }}/ndk/27.3.13750724
          key: ${{ runner.os }}-ndk-27.3.13750724-v1
          restore-keys: |
            ${{ runner.os }}-ndk-27.3.13750724-

      - name: Install NDK
        if: steps.cache-ndk.outputs.cache-hit != 'true'
        shell: bash
        run: |
          set -euo pipefail
          sdkmanager "ndk;27.3.13750724"

      - name: Configure local.properties
        shell: bash
        run: |
          set -euo pipefail
          echo "sdk.dir=${ANDROID_SDK_ROOT}" > local.properties
          echo "ndk.dir=${ANDROID_SDK_ROOT}/ndk/27.3.13750724" >> local.properties

      - name: Update CA certificates
        shell: bash
        run: |
          set -euo pipefail
          run_as_root() {
            if [ "$(id -u)" -eq 0 ]; then
              "$@"
            elif sudo -n true 2>/dev/null; then
              sudo "$@"
            else
              return 1
            fi
          }

          if run_as_root true; then
            run_as_root apt-get update
            run_as_root apt-get install -y ca-certificates
            run_as_root update-ca-certificates
          elif [ ! -f /etc/ssl/certs/ca-certificates.crt ]; then
            echo "ca-certificates bundle missing and sudo is unavailable" >&2
            exit 1
          else
            echo "Skipping CA package refresh because sudo is unavailable; using existing system bundle."
          fi

          mkdir -p modules/core/src/foss/golang/mihomo/component/ca
          cp -f /etc/ssl/certs/ca-certificates.crt modules/core/src/foss/golang/mihomo/component/ca/ca-certificates.crt

      - name: Sync kernel
        shell: bash
        run: |
          set -euo pipefail
          chmod +x scripts/sync-kernel.sh
          ./scripts/sync-kernel.sh "${CHANNEL}"

      - name: Download native libs
        uses: actions/download-artifact@v5
        with:
          name: native-libs-${{ inputs.kernel_channel }}
          path: jniLibs

      - name: Verify native outputs
        shell: bash
        run: |
          set -euo pipefail
          test -f jniLibs/arm64-v8a/libclash.so
          test -f jniLibs/arm64-v8a/libbridge.so

      - name: Check GitHub OSS release policy
        shell: bash
        run: |
          set -euo pipefail
          chmod +x gradlew
          ./gradlew checkGithubOssLicensePolicy --no-daemon

      - name: Restore signing files
        if: ${{ env.ACT != 'true' }}
        shell: bash
        env:
          SIGNING_KEYSTORE_BASE64: ${{ secrets.SIGNING_KEYSTORE_BASE64 }}
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -z "${SIGNING_KEYSTORE_BASE64:-}" ] || [ -z "${SIGNING_STORE_PASSWORD:-}" ] || [ -z "${SIGNING_KEY_ALIAS:-}" ] || [ -z "${SIGNING_KEY_PASSWORD:-}" ]; then
            echo "::error::Signing secrets are missing"
            exit 1
          fi

          printf '%s' "${SIGNING_KEYSTORE_BASE64}" | base64 --decode > release.keystore
          keytool -list -keystore release.keystore -storepass "${SIGNING_STORE_PASSWORD}" -alias "${SIGNING_KEY_ALIAS}" > /dev/null 2>&1

      - name: Build Release APKs
        shell: bash
        env:
          YUMEBOX_KEYSTORE_PATH: ${{ github.workspace }}/release.keystore
          YUMEBOX_KEYSTORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
          YUMEBOX_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          YUMEBOX_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          chmod +x gradlew
          if [ "${ACT:-}" = "true" ]; then
            ./gradlew assembleRelease -Prelease.signing.required=false --no-daemon
          else
            ./gradlew assembleRelease --no-daemon
          fi

      - name: Prepare artifacts and release metadata
        id: prep
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ci-artifacts/apk ci-artifacts/mapping

          find build/app/outputs/apk/release -maxdepth 1 -type f -name '*.apk' | while read -r file; do
            base="$(basename "$file")"
            cp -f "$file" "ci-artifacts/apk/monadbox-${CHANNEL}-${base}"
          done

          if [ -d build/app/outputs/mapping/release ]; then
            cp -r build/app/outputs/mapping/release "ci-artifacts/mapping/${CHANNEL}"
          fi

          rev_short="${REV:0:8}"
          release_tag="${CHANNEL}-${TAG}-${rev_short}"
          if [ "${CHANNEL}" = "meta" ]; then
            prerelease="false"
          else
            prerelease="true"
          fi

          echo "release_tag=${release_tag}" >> "${GITHUB_OUTPUT}"
          echo "prerelease=${prerelease}" >> "${GITHUB_OUTPUT}"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: monadbox-${{ env.CHANNEL }}-release-bundle
          path: |
            ci-artifacts/apk/*.apk
            ci-artifacts/mapping/${{ env.CHANNEL }}/**
          if-no-files-found: error

      - name: Ensure tag and release do not already exist
        if: ${{ env.ACT != 'true' }}
        shell: bash
        env:
          RELEASE_TAG: ${{ steps.prep.outputs.release_tag }}
        run: |
          set -euo pipefail

          if git ls-remote --exit-code --tags origin "refs/tags/${RELEASE_TAG}" >/dev/null 2>&1; then
            echo "::error::Tag already exists: ${RELEASE_TAG}"
            exit 1
          fi

          if gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${RELEASE_TAG}" >/dev/null 2>&1; then
            echo "::error::Release already exists for tag: ${RELEASE_TAG}"
            exit 1
          fi

      - name: Configure git committer for release tag
        if: ${{ env.ACT != 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create and push release tag
        if: ${{ env.ACT != 'true' }}
        shell: bash
        env:
          RELEASE_TAG: ${{ steps.prep.outputs.release_tag }}
        run: |
          set -euo pipefail
          git tag --annotate "${RELEASE_TAG}" "${GITHUB_SHA}" --message "Release ${RELEASE_TAG}"
          git push origin "refs/tags/${RELEASE_TAG}"

      - name: Create GitHub release and upload assets
        if: ${{ env.ACT != 'true' }}
        shell: bash
        env:
          RELEASE_TAG: ${{ steps.prep.outputs.release_tag }}
          PRERELEASE: ${{ steps.prep.outputs.prerelease }}
        run: |
          set -euo pipefail
          gh api \
            --method POST \
            --header "Accept: application/vnd.github+json" \
            "repos/${GITHUB_REPOSITORY}/releases" \
            -f tag_name="${RELEASE_TAG}" \
            -f target_commitish="${GITHUB_SHA}" \
            -f name="${RELEASE_TAG}" \
            -F prerelease="${PRERELEASE}" \
            -F generate_release_notes=true

          gh release upload "${RELEASE_TAG}" ci-artifacts/apk/*.apk

  commit-kernel-state:
    name: Commit Kernel State
    needs: release
    runs-on: ubuntu-latest
    # Serialize across all concurrent channel jobs so pushes never race.
    concurrency:
      group: kernel-state-${{ github.ref_name }}
      cancel-in-progress: false
    env:
      CHANNEL: ${{ inputs.kernel_channel }}
      REPO: ${{ inputs.upstream_repo }}
      TAG: ${{ inputs.upstream_tag }}
      REV: ${{ inputs.upstream_revision }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Commit and push kernel state
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .github/kernel-state
          state_file=".github/kernel-state/${CHANNEL}.txt"
          printf '%s|%s|%s\n' "${REPO}" "${TAG}" "${REV}" > "${state_file}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git diff --quiet -- "${state_file}"; then
            echo "Kernel state unchanged, nothing to commit."
            exit 0
          fi

          # Pull latest before committing: a sibling channel job may have pushed
          # while this job was waiting in the concurrency queue.
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git add "${state_file}"
          git commit -m "chore(kernel-state): sync ${CHANNEL} to ${TAG} (${REV:0:8})"
          git push origin "HEAD:${GITHUB_REF_NAME}"
