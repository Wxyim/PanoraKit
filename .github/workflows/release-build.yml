name: Build Release

on:
  workflow_call:
    inputs:
      kernel_channel:
        required: true
        type: string
      upstream_repo:
        required: true
        type: string
      upstream_tag:
        required: true
        type: string
      upstream_revision:
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      CHANNEL: ${{ inputs.kernel_channel }}
      REPO: ${{ inputs.upstream_repo }}
      TAG: ${{ inputs.upstream_tag }}
      REV: ${{ inputs.upstream_revision }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Kotlin
        uses: fwilhe2/setup-kotlin@main

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: true
          cache-dependency-path: |
            **/go.sum

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3.2.2
        with:
          packages: ''

      - name: Cache NDK
        id: cache-ndk
        uses: actions/cache@v5
        with:
          path: ${{ env.ANDROID_SDK_ROOT }}/ndk/27.3.13750724
          key: ${{ runner.os }}-ndk-27.3.13750724-v1
          restore-keys: |
            ${{ runner.os }}-ndk-27.3.13750724-

      - name: Install NDK
        if: steps.cache-ndk.outputs.cache-hit != 'true'
        run: sdkmanager "ndk;27.3.13750724"

      - name: Configure local.properties
        run: |
          echo "sdk.dir=${ANDROID_SDK_ROOT}" > local.properties
          echo "ndk.dir=${ANDROID_SDK_ROOT}/ndk/27.3.13750724" >> local.properties

      - name: Update CA certificates
        run: |
          sudo apt-get update && sudo apt-get install -y ca-certificates
          sudo update-ca-certificates
          mkdir -p modules/core/src/foss/golang/mihomo/component/ca
          cp -f /etc/ssl/certs/ca-certificates.crt modules/core/src/foss/golang/mihomo/component/ca/ca-certificates.crt

      - name: Sync kernel
        run:  |
          chmod +x scripts/sync-kernel.sh
          ./scripts/sync-kernel.sh $CHANNEL

      - name: Restore signing files
        shell: bash
        env:
          SIGNING_KEYSTORE_BASE64: ${{ secrets.SIGNING_KEYSTORE_BASE64 }}
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: |
          set -euo pipefail

          if [ -z "${SIGNING_KEYSTORE_BASE64:-}" ] || \
            [ -z "${SIGNING_STORE_PASSWORD:-}" ] || \
            [ -z "${SIGNING_KEY_ALIAS:-}" ] || \
            [ -z "${SIGNING_KEY_PASSWORD:-}" ]; then
            echo "::error::Signing secrets are missing"
            exit 1
          fi

          printf '%s' "$SIGNING_KEYSTORE_BASE64" | base64 --decode > release.keystore

          keytool -list \
            -keystore release.keystore \
            -storepass "$SIGNING_STORE_PASSWORD" \
            -alias "$SIGNING_KEY_ALIAS" > /dev/null 2>&1

      - name: Build Native Libraries
        env:
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}
          ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}
          ANDROID_NDK_HOME: ${{ env.ANDROID_SDK_ROOT }}/ndk/27.3.13750724
        run: kotlin scripts/native-build.main.kts --all

      - name: Build Release APKs
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease -Prelease.signing.required=true --no-daemon
        env:
          YUMEBOX_KEYSTORE_PATH: ${{ github.workspace }}/release.keystore
          YUMEBOX_KEYSTORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
          YUMEBOX_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          YUMEBOX_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}

      - name: Prepare renamed artifacts
        run: |
          set -eu
          mkdir -p ci-artifacts/apk ci-artifacts/mapping

          find build/app/outputs/apk/release -maxdepth 1 -type f -name '*.apk' | while read -r file; do
            base="$(basename "$file")"
            artifact_prefix="monadbox-${CHANNEL}"
            cp -f "$file" "ci-artifacts/apk/${artifact_prefix}-${base}"
          done

          if [ -d build/app/outputs/mapping/release ]; then
            cp -r build/app/outputs/mapping/release "ci-artifacts/mapping/${CHANNEL}"
          fi

      - name: Upload arm64-v8a APK
        uses: actions/upload-artifact@v7
        with:
          name: monadbox-${{ env.CHANNEL }}-arm64-v8a
          path: ci-artifacts/apk/*arm64-v8a*.apk
          archive: false

      - name: Upload armeabi-v7a APK
        uses: actions/upload-artifact@v7
        with:
          name: monadbox-${{ env.CHANNEL }}-armeabi-v7a
          path: ci-artifacts/apk/*armeabi-v7a*.apk
          archive: false

      - name: Upload x86_64 APK
        uses: actions/upload-artifact@v7
        with:
          name: monadbox-${{ env.CHANNEL }}-x86_64
          path: ci-artifacts/apk/*x86_64*.apk
          archive: false

      - name: Upload x86 APK
        uses: actions/upload-artifact@v7
        with:
          name: monadbox-${{ env.CHANNEL }}-x86
          path: |
            ci-artifacts/apk/*x86*.apk
            !ci-artifacts/apk/*x86_64*.apk
          archive: false

      - name: Upload universal APK
        uses: actions/upload-artifact@v7
        with:
          name: monadbox-${{ env.CHANNEL }}-universal
          path: ci-artifacts/apk/*universal*.apk
          archive: false
          if-no-files-found: error

      - name: Upload mappings
        uses: actions/upload-artifact@v7
        with:
          name: mappings-${{ env.CHANNEL }}
          path: ci-artifacts/mapping/${{ env.CHANNEL }}/

      - name: Compute tag
        id: tag
        run: |
          short=${REV:0:8}
          tag="${CHANNEL}-${TAG}-${short}"
          echo "tag=$tag" >> $GITHUB_OUTPUT

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          prerelease: ${{ inputs.kernel_channel != 'meta' }}
          files: ci-artifacts/apk/monadbox-${{ env.CHANNEL }}-*.apk

      - name: Update state
        run: |
          mkdir -p .github/kernel-state
          echo "$REPO|$TAG|$REV" > .github/kernel-state/$CHANNEL.txt

      - name: Short revision
        run: echo "REV_SHORT=${REV:0:8}" >> $GITHUB_ENV

      - name: Commit state
        uses: EndBug/add-and-commit@v9
        with:
          add: '.github/kernel-state/*'
          message: >
            chore(kernel-state): sync ${{ env.CHANNEL }}
            to ${{ env.TAG }} (${{ env.REV_SHORT }})
          default_author: github_actions