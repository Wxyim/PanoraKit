name: Build MonadBox

on:
  push:
    branches: [ "Monad" ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'website/**'
      - '.gitignore'
  schedule:
    - cron: '0 18 * * *'
    - cron: '20 18 * * *'
  workflow_dispatch:
    inputs:
      kernel_channel:
        description: 'Kernel channel to build'
        required: true
        default: all
        type: choice
        options:
          - all
          - alpha
          - meta
          - smart
  workflow_call:

concurrency:
  group: Build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write


jobs:
  prepare-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Prepare matrix
        id: set-matrix
        shell: bash
        run: |
          set -eu

          alpha='{"variant":"alpha","cron":"0 18 * * *","kernel_channel":"alpha","title":"MonadBox Alpha","artifact_prefix":"monadbox-alpha","aliyun_secret_name":"ALIYUN_SERVICES_JSON","release_tag":"Pre-release","release_name":"Pre-release"}'
          meta='{"variant":"meta","cron":"","kernel_channel":"meta","title":"MonadBox Meta","artifact_prefix":"monadbox-meta","aliyun_secret_name":"ALIYUN_SERVICES_JSON","release_tag":"Meta","release_name":"Meta"}'
          smart='{"variant":"smart","cron":"20 18 * * *","kernel_channel":"smart","title":"MonadBox Smart","artifact_prefix":"monadbox-smart","aliyun_secret_name":"ALIYUN_SERVICES_JSON_SMART","release_tag":"Smart","release_name":"Smart"}'

          if [ "${{ github.event_name }}" = "schedule" ]; then
            case "${{ github.event.schedule }}" in
              '0 18 * * *') matrix="{\"include\":[${alpha}]}" ;;
              '20 18 * * *') matrix="{\"include\":[${smart}]}" ;;
              *)
                echo "Unsupported schedule: ${{ github.event.schedule }}" >&2
                exit 1
                ;;
            esac
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            case "${{ github.event.inputs.kernel_channel }}" in
              alpha) matrix="{\"include\":[${alpha}]}" ;;
              meta) matrix="{\"include\":[${meta}]}" ;;
              smart) matrix="{\"include\":[${smart}]}" ;;
              all) matrix="{\"include\":[${alpha},${meta},${smart}]}" ;;
              *)
                echo "Unsupported kernel_channel: ${{ github.event.inputs.kernel_channel }}" >&2
                exit 1
                ;;
            esac
          else
            matrix="{\"include\":[${alpha},${meta},${smart}]}"
          fi

          echo "matrix=${matrix}" >> "$GITHUB_OUTPUT"

  build:
    needs: prepare-matrix
    name: Build (${{ matrix.variant }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare-matrix.outputs.matrix) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'

      - name: Setup Kotlin
        uses: fwilhe2/setup-kotlin@main

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: true
          cache-dependency-path: |
            **/go.sum

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3.2.2
        with:
          packages: ''

      - name: Cache NDK
        id: cache-ndk
        uses: actions/cache@v5
        with:
          path: ${{ env.ANDROID_SDK_ROOT }}/ndk/27.3.13750724
          key: ${{ runner.os }}-ndk-27.3.13750724-v1
          restore-keys: |
            ${{ runner.os }}-ndk-27.3.13750724-

      - name: Install NDK
        if: steps.cache-ndk.outputs.cache-hit != 'true'
        run: sdkmanager "ndk;27.3.13750724"

      - name: Configure local.properties
        run: |
          echo "sdk.dir=${ANDROID_SDK_ROOT}" > local.properties
          echo "ndk.dir=${ANDROID_SDK_ROOT}/ndk/27.3.13750724" >> local.properties

      - name: Update CA certificates
        run: |
          sudo apt-get update && sudo apt-get install -y ca-certificates
          sudo update-ca-certificates
          mkdir -p modules/core/src/foss/golang/mihomo/component/ca
          cp -f /etc/ssl/certs/ca-certificates.crt modules/core/src/foss/golang/mihomo/component/ca/ca-certificates.crt

      - name: Sync kernel
        run: |
          chmod +x scripts/sync-kernel.sh
          ./scripts/sync-kernel.sh ${{ matrix.kernel_channel }}

      - name: Check upload availability
        id: check_upload
        run: echo "UPLOAD=${{ secrets.BOT_TOKEN != '' }}" >> $GITHUB_OUTPUT
      
      - name: Restore signing files
        shell: bash
        env:
          SIGNING_KEYSTORE_BASE64: ${{ secrets.SIGNING_KEYSTORE_BASE64 }}
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: |
          set -euo pipefail

          echo "[signing] Restoring keystore..."

          if [ -z "${SIGNING_KEYSTORE_BASE64:-}" ] || \
            [ -z "${SIGNING_STORE_PASSWORD:-}" ] || \
            [ -z "${SIGNING_KEY_ALIAS:-}" ] || \
            [ -z "${SIGNING_KEY_PASSWORD:-}" ]; then
            echo "::error::Signing secrets are missing"
            exit 1
          fi

          printf '%s' "$SIGNING_KEYSTORE_BASE64" | base64 --decode > release.keystore

          if ! keytool -list -keystore release.keystore \
              -storepass "$SIGNING_STORE_PASSWORD" \
              -alias "$SIGNING_KEY_ALIAS" > /dev/null 2>&1; then
            echo "::error::Keystore validation failed (wrong password/alias or corrupted base64)"
            exit 1
          fi

          {
            printf 'keystore.password=%s\n' "$SIGNING_STORE_PASSWORD"
            printf 'key.alias=%s\n' "$SIGNING_KEY_ALIAS"
            printf 'key.password=%s\n' "$SIGNING_KEY_PASSWORD"
            printf 'keystore.path=release.keystore\n'
          } > signing.properties

          echo "[signing] Signing setup OK"

      - name: Build Native Libraries
        env:
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}
          ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}
          ANDROID_NDK_HOME: ${{ env.ANDROID_SDK_ROOT }}/ndk/27.3.13750724
        run: kotlin scripts/native-build.main.kts --all

      - name: Build Release APKs
        run: |
          chmod +x gradlew
          ./gradlew --no-daemon assembleRelease

      - name: Prepare renamed artifacts
        run: |
          set -eu
          mkdir -p ci-artifacts/apk ci-artifacts/mapping

          find app/build/outputs/apk/release -maxdepth 1 -type f -name '*.apk' | while read -r file; do
            base="$(basename "$file")"
            cp -f "$file" "ci-artifacts/apk/${{ matrix.artifact_prefix }}-${base}"
          done

          if [ -d app/build/outputs/mapping/release ]; then
            cp -r app/build/outputs/mapping/release "ci-artifacts/mapping/${{ matrix.variant }}"
          fi

      - name: Upload arm64-v8a APK
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_prefix }}-arm64-v8a
          path: ci-artifacts/apk/*arm64-v8a*.apk
          archive: false

      - name: Upload armeabi-v7a APK
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_prefix }}-armeabi-v7a
          path: ci-artifacts/apk/*armeabi-v7a*.apk
          archive: false

      - name: Upload x86_64 APK
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_prefix }}-x86_64
          path: ci-artifacts/apk/*x86_64*.apk
          archive: false

      - name: Upload x86 APK
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_prefix }}-x86
          path: |
            ci-artifacts/apk/*x86*.apk
            !ci-artifacts/apk/*x86_64*.apk
          archive: false

      - name: Upload universal APK
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_prefix }}-universal
          path: ci-artifacts/apk/*universal*.apk
          archive: false
          if-no-files-found: error

      - name: Upload mappings
        uses: actions/upload-artifact@v7
        with:
          name: mappings-${{ matrix.variant }}
          path: ci-artifacts/mapping/${{ matrix.variant }}/

      - name: Publish pre-release
        if: github.event_name != 'workflow_call'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ matrix.release_tag }}
          name: ${{ matrix.release_name }}
          prerelease: true
          draft: false
          target_commitish: ${{ github.sha }}
          overwrite_files: true
          fail_on_unmatched_files: true
          files: |
            ci-artifacts/apk/${{ matrix.artifact_prefix }}-*.apk