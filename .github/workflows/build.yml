name: Build YumeBox

on:
  push:
    branches: [ "Yume", "Dev" ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'website/**'
      - '.gitignore'
  schedule:
    - cron: '0 18 * * *'
    - cron: '20 18 * * *'
  workflow_dispatch:
  workflow_call:

concurrency:
  group: Build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write


jobs:
  prepare-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Prepare matrix
        id: set-matrix
        shell: bash
        run: |
          set -eu

          alpha='{"variant":"alpha","cron":"0 18 * * *","kernel_channel":"alpha","title":"YumeBox","artifact_prefix":"yumebox","aliyun_secret_name":"ALIYUN_SERVICES_JSON","release_tag":"Pre-release","release_name":"Pre-release"}'
          smart='{"variant":"smart","cron":"20 18 * * *","kernel_channel":"smart","title":"YumeBox Smart","artifact_prefix":"yumebox-smart","aliyun_secret_name":"ALIYUN_SERVICES_JSON_SMART","release_tag":"Smart","release_name":"Smart"}'

          if [ "${{ github.event_name }}" = "schedule" ]; then
            case "${{ github.event.schedule }}" in
              '0 18 * * *') matrix="{\"include\":[${alpha}]}" ;;
              '20 18 * * *') matrix="{\"include\":[${smart}]}" ;;
              *)
                echo "Unsupported schedule: ${{ github.event.schedule }}" >&2
                exit 1
                ;;
            esac
          else
            matrix="{\"include\":[${alpha},${smart}]}"
          fi

          echo "matrix=${matrix}" >> "$GITHUB_OUTPUT"

  build:
    needs: prepare-matrix
    name: Build (${{ matrix.variant }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare-matrix.outputs.matrix) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'

      - name: Setup Kotlin
        uses: fwilhe2/setup-kotlin@main

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: true
          cache-dependency-path: |
            **/go.sum

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: armv7-linux-androideabi, aarch64-linux-android, i686-linux-android, x86_64-linux-android

      - name: Cache Rust
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            lib/native/rust/target/
          key: ${{ runner.os }}-rust-${{ hashFiles('lib/native/rust/**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-rust-

      - name: Install cargo-ndk
        run: |
          if ! command -v cargo-ndk &> /dev/null; then
            cargo install cargo-ndk
          else
            echo "cargo-ndk already installed"
          fi

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3.2.2
        with:
          packages: ''

      - name: Cache NDK
        id: cache-ndk
        uses: actions/cache@v5
        with:
          path: ${{ env.ANDROID_SDK_ROOT }}/ndk/29.0.14206865
          key: ${{ runner.os }}-ndk-29.0.14206865-v1
          restore-keys: |
            ${{ runner.os }}-ndk-29.0.14206865-

      - name: Install NDK
        if: steps.cache-ndk.outputs.cache-hit != 'true'
        run: sdkmanager "ndk;29.0.14206865"

      - name: Configure local.properties
        run: |
          echo "sdk.dir=${ANDROID_SDK_ROOT}" > local.properties
          echo "ndk.dir=${ANDROID_SDK_ROOT}/ndk/29.0.14206865" >> local.properties

      - name: Update CA certificates
        run: |
          sudo apt-get update && sudo apt-get install -y ca-certificates
          sudo update-ca-certificates
          mkdir -p core/src/foss/golang/mihomo/component/ca
          cp -f /etc/ssl/certs/ca-certificates.crt core/src/foss/golang/mihomo/component/ca/ca-certificates.crt

      - name: Sync kernel
        run: |
          chmod +x scripts/sync-kernel.sh
          ./scripts/sync-kernel.sh ${{ matrix.kernel_channel }}

      - name: Check upload availability
        id: check_upload
        run: echo "UPLOAD=${{ secrets.BOT_TOKEN != '' }}" >> $GITHUB_OUTPUT

      - name: Write signing config
        run: |
          if [ -n "${{ secrets.SIGNING_STORE_PASSWORD }}" ]; then
            echo "keystore.password=${{ secrets.SIGNING_STORE_PASSWORD }}" > signing.properties
            echo "key.alias=${{ secrets.SIGNING_KEY_ALIAS }}" >> signing.properties
            echo "key.password=${{ secrets.SIGNING_KEY_PASSWORD }}" >> signing.properties
            echo "keystore.path=release.keystore" >> signing.properties
          fi
      - name: Write sentry config
        run: |
          if [ -n "${{ secrets.SENTRY_AUTH_TOKEN }}" ]; then
            echo "${{ secrets.SENTRY_AUTH_TOKEN }}" | base64 --decode > sentry.properties
          fi

      - name: Inject aliyun-emas-services.json
        env:
          ALIYUN_SERVICES_JSON_CURRENT: ${{ secrets[matrix.aliyun_secret_name] }}
        run: |
          if [ -n "${ALIYUN_SERVICES_JSON_CURRENT}" ]; then
            echo "Using real aliyun-emas-services.json from secrets"
            echo "${ALIYUN_SERVICES_JSON_CURRENT}" | base64 --decode > app/aliyun-emas-services.json
          fi

      - name: Build Native Libraries
        env:
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}
          ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}
          ANDROID_NDK_HOME: ${{ env.ANDROID_SDK_ROOT }}/ndk/29.0.14206865
        run: kotlin scripts/native-build.main.kts --all

      - name: Build Release APKs
        run: |
          chmod +x gradlew
          ./gradlew --no-daemon assembleRelease

      - name: Prepare renamed artifacts
        run: |
          set -eu
          mkdir -p ci-artifacts/apk ci-artifacts/mapping

          find app/build/outputs/apk/release -maxdepth 1 -type f -name '*.apk' | while read -r file; do
            base="$(basename "$file")"
            cp -f "$file" "ci-artifacts/apk/${{ matrix.artifact_prefix }}-${base}"
          done

          if [ -d app/build/outputs/mapping/release ]; then
            cp -r app/build/outputs/mapping/release "ci-artifacts/mapping/${{ matrix.variant }}"
          fi

      - name: Upload arm64-v8a APK
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_prefix }}-arm64-v8a
          path: ci-artifacts/apk/*arm64-v8a*.apk
          archive: false

      - name: Upload armeabi-v7a APK
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_prefix }}-armeabi-v7a
          path: ci-artifacts/apk/*armeabi-v7a*.apk
          archive: false

      - name: Upload x86_64 APK
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_prefix }}-x86_64
          path: ci-artifacts/apk/*x86_64*.apk
          archive: false

      - name: Upload x86 APK
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_prefix }}-x86
          path: |
            ci-artifacts/apk/*x86*.apk
            !ci-artifacts/apk/*x86_64*.apk
          archive: false

      - name: Upload universal APK
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_prefix }}-universal
          path: ci-artifacts/apk/*universal*.apk
          archive: false
          if-no-files-found: error

      - name: Upload mappings
        uses: actions/upload-artifact@v7
        with:
          name: mappings-${{ matrix.variant }}
          path: ci-artifacts/mapping/${{ matrix.variant }}/

      - name: Publish pre-release
        if: github.event_name != 'workflow_call'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ matrix.release_tag }}
          name: ${{ matrix.release_name }}
          prerelease: true
          draft: false
          target_commitish: ${{ github.sha }}
          overwrite_files: true
          fail_on_unmatched_files: true
          files: |
            ci-artifacts/apk/${{ matrix.artifact_prefix }}-*.apk

      - name: Bot session cache
        if: steps.check_upload.outputs.UPLOAD == 'true'
        uses: actions/cache@v5
        with:
          path: scripts/yumebot.session
          key: ${{ runner.os }}-bot-session-${{ github.ref_name }}-${{ matrix.variant }}
          restore-keys: |
            ${{ runner.os }}-bot-session-${{ github.ref_name }}-
            ${{ runner.os }}-bot-session-

      - name: Upload to Telegram
        if: steps.check_upload.outputs.UPLOAD == 'true'
        env:
          CHAT_ID: ${{ secrets.CHAT_ID }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          MESSAGE_THREAD_ID: ${{ secrets.MESSAGE_THREAD_ID }}
          TITLE: ${{ matrix.title }}
          BRANCH: ${{ github.ref_name }}
          WORKFLOW_NAME: ${{ github.workflow }}
          EVENT_NAME: ${{ github.event_name }}
          RUN_NUMBER: ${{ github.run_number }}
          COMMIT_SHA: ${{ github.sha }}
          REPOSITORY: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
          SERVER_URL: ${{ github.server_url }}
        run: python3 $GITHUB_WORKSPACE/scripts/yumebot.py
